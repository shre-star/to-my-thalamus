<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>To My Thalamus ❤️</title>

<style>

margin:0;
background:linear-gradient(135deg,#1b1b1b,#8b0000);
font-family:Arial,sans-serif;

text-align:center;
}

h1{

font-size:50px;
}

p{
font-size:22px;
padding:0 20px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

}

.gallery img:hover{

}

.button{

margin:30px;

background:#ff4d6d;

</head>
